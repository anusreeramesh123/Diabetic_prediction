<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiaPredict AI — Diabetes Risk Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #060b13;
    --bg2: #0a1322;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.1);
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #00f2fe; /* Cyber Blue */
    --accent2: #4facfe; /* Royal Blue */
    --accent-glow: rgba(0, 242, 254, 0.3);
    --input-bg: rgba(255,255,255,0.05);
  }
  :root[data-theme="light"] {
    --bg: #f0f9ff;
    --bg2: #e0f2fe;
    --surface: rgba(255,255,255,0.8);
    --border: rgba(14, 165, 233, 0.2);
    --text: #0f172a;
    --text-muted: #64748b;
    --accent: #0284c7;
    --accent2: #0369a1;
    --accent-glow: rgba(2, 132, 199, 0.2);
    --input-bg: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: all 0.4s ease;
  }

  /* ── Animated Background ── */
  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .page-wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }

  /* ── Top Bar ── */
  .topbar {
    width: 100%;
    max-width: 700px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: grid; place-items: center;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .brand-name { font-family: 'Syne'; font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }

  /* ── Theme Toggle ── */
  .toggle {
    width: 50px; height: 26px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer; position: relative;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    transition: transform 0.3s;
  }
  [data-theme="dark"] .toggle::after { transform: translateX(24px); }

  /* ── Main Card ── */
  .card {
    width: 100%;
    max-width: 700px;
    background: var(--surface);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 50px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }

  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-family: 'Syne'; font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
  .header h1 span { background: linear-gradient(to right, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: var(--text-muted); font-size: 0.95rem; }

  /* ── Form Grid ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
  
  .field input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 12px;
    color: var(--text);
    font-size: 1rem;
    transition: all 0.3s ease;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

  /* ── Prediction Button ── */
  .btn-submit {
    grid-column: 1 / -1;
    margin-top: 20px;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 15px;
    color: #fff;
    font-family: 'Syne';
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--accent-glow); }
  .btn-submit:active { transform: translateY(0); }

  /* ── Result Box ── */
  .result-box {
    margin-top: 30px;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    font-weight: 700;
    font-size: 1.1rem;
    animation: slideUp 0.5s ease;
    background: rgba(0, 242, 254, 0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .card { padding: 30px 20px; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="page-wrap">
  <nav class="topbar">
    <div class="brand">
      <div class="logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg></div>
      <span class="brand-name">DiaPredict AI</span>
    </div>
    <button class="toggle" id="themeToggle"></button>
  </nav>

  <div class="card">
    <div class="header">
      <h1>Diabetes <span>Risk Analysis</span></h1>
      <p>Enter clinical metrics to assess diabetes probability.</p>
    </div>

    <form action="/predict" method="POST">
      <div class="form-grid">
        <div class="field">
          <label>Pregnancies</label>
          <input type="number" name="pregnancies" placeholder="0" required>
        </div>
        <div class="field">
          <label>Glucose (mg/dL)</label>
          <input type="number" name="glucose" placeholder="120" required>
        </div>
        <div class="field">
          <label>Blood Pressure</label>
          <input type="number" name="blood_pressure" placeholder="80" required>
        </div>
        <div class="field">
          <label>Skin Thickness (mm)</label>
          <input type="number" name="skin_thickness" placeholder="20" required>
        </div>
        <div class="field">
          <label>Insulin (mu U/ml)</label>
          <input type="number" name="insulin" placeholder="80" required>
        </div>
        <div class="field">
          <label>BMI</label>
          <input type="number" step="0.1" name="bmi" placeholder="24.5" required>
        </div>
        <div class="field">
          <label>Diabetes Pedigree</label>
          <input type="number" step="0.001" name="dpf" placeholder="0.45" required>
        </div>
        <div class="field">
          <label>Age (Years)</label>
          <input type="number" name="age" placeholder="30" required>
        </div>

        <button type="submit" class="btn-submit">Run AI Assessment</button>
      </div>

      {% if prediction_text %}
      <div class="result-box">
        {{ prediction_text }}
      </div>
      {% endif %}
    </form>
  </div>
</div>

<script>
  // Theme Toggle
  const toggle = document.getElementById('themeToggle');
  const root = document.documentElement;
  toggle.addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', isDark ? 'light' : 'dark');
  });

  // Animated Particles Background
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2 + 1;
      this.speedX = Math.random() * 1 - 0.5;
      this.speedY = Math.random() * 1 - 0.5;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.x > canvas.width) this.x = 0;
      if (this.x < 0) this.x = canvas.width;
      if (this.y > canvas.height) this.y = 0;
      if (this.y < 0) this.y = canvas.height;
    }
    draw() {
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
      ctx.globalAlpha = 0.2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function init() {
    particles = [];
    for (let i = 0; i < 80; i++) particles.push(new Particle());
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animate);
  }

  init();
  animate();
</script>
</body>
</html>
